version: "3.9"

services:
  flask-app:
    build:
      context: .
      dockerfile: mock_server/Dockerfile
    expose:
      - "5000"
    environment:
      - PYTHONPATH=/app
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "5000:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - flask-app
    restart: always
