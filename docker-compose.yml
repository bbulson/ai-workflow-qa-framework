services:
  # The Python Flask Application
  flask-app:
    build:
      context: .
      dockerfile: mock_server/Dockerfile
    expose:
      - "5000"
    environment:
      - PYTHONPATH=/app
    restart: always

  # The Nginx Reverse Proxy (SSL Provider)
  nginx:
    image: nginx:latest
    ports:
      - "5000:443" # JMeter hits https://localhost:5000 -> Nginx handles it as 443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - flask-app
    restart: always
