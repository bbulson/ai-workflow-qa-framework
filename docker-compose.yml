services:
  flask-app:
    build:
      context: .
      dockerfile: mock_server/Dockerfile
    expose:
      - "5000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://qauser:qapassword@db:5432/qadb  # add this
    depends_on:
      - db  # add this
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "5000:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - flask-app
    restart: always

  # ADD THIS:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: qauser
      POSTGRES_PASSWORD: qapassword
      POSTGRES_DB: qadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
