name: QA Automation Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: List files for debugging
        run: ls -R tests

      - name: Run tests
        env:
          # This tells Python: "The root of my repo is an official source for code"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests
      - name: Run JMeter Performance Test
        timeout-minutes: 5
        run: |
          # 1. Download modern JMeter
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          
          # 2. Run using the modern binary
          ./apache-jmeter-5.6.3/bin/jmeter -n -t jmeter_test_plan.jmx -l results.jtl \
          -Jjmeter.save.saveservice.output_format=csv \
          -X
          
          # 3. Print Results
          echo "--- JMeter Test Results ---"
          if [ -f results.jtl ]; then 
            cat results.jtl
          else 
            echo "Results file not found. Check JMeter logs."
            exit 1
          fi
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: pytest-report
          path: reports/report.html
