name: QA Automation Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: List files for debugging
        run: ls -R tests

      - name: Run tests
        env:
          # This tells Python: "The root of my repo is an official source for code"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests
      - name: Run JMeter Performance Test
        timeout-minutes: 2
        run: |
          sudo apt-get update && sudo apt-get install -y jmeter
          
          # This command explicitly whitelists the exact class that is failing
          jmeter -n -t jmeter_test_plan.jmx -l results.jtl \
          -Jjmeter.save.saveservice.output_format=csv \
          -Dcom.thoughtworks.xstream.security.wildcard=true \
          -Dcom.thoughtworks.xstream.security.whitelist=org.apache.jmeter.save.ScriptWrapper \
          -X
          
          echo "--- JMeter Test Results ---"
          if [ -f results.jtl ]; then 
            cat results.jtl
          else 
            echo "Results file not found - JMeter failed to start."
            exit 1
          fi
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: pytest-report
          path: reports/report.html
