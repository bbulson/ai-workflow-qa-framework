name: QA Automation Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: List files for debugging
        run: ls -R

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Note: Ensure pytest is configured to generate the html report in the 'reports/' folder
        run: pytest tests --html=reports/report.html --self-contained-html

      - name: Start Flask and Run JMeter Performance Test
        timeout-minutes: 10
        run: |
          # 1. Start your Flask app in the background
          # We use '&' so the terminal stays open for the next commands
          python ai-workflow-qa-framework/mock_server/chatbot_mock.py & 
          
          # 2. Wait 10 seconds to give Flask time to boot up
          sleep 20
          
          # 3. Download modern JMeter
          echo "Downloading JMeter..."
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          
          # 4. Extract the archive
          echo "Extracting JMeter..."
          tar -xzf apache-jmeter-5.6.3.tgz
          
          # 5. Run the test
          # -n: non-GUI mode
          # -t: your test plan (Ensure jmeter_test_plan.jmx is in your root folder)
          # -l: where to save raw results
          # -e -o: generate the HTML dashboard folder
          echo "Running JMeter Test..."
          ./apache-jmeter-5.6.3/bin/jmeter -n -t jmeter_test_plan.jmx -l results.jtl -e -o jmeter_dashboard/
          
          # 6. Print Results to console for quick debugging
          echo "--- JMeter Raw CSV Results ---"
          if [ -f results.jtl ]; then 
            cat results.jtl
          else 
            echo "Results file (results.jtl) not found. Check JMeter logs."
            exit 1
          fi

      - name: Upload Pytest Report
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: pytest-functional-report
          path: reports/report.html

      - name: Upload JMeter Dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-performance-report
          path: jmeter_dashboard/
