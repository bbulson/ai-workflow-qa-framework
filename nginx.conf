events {}

http {
    # This must match the service name in your docker-compose.yml
    upstream flask_backend {
        server flask-app:5000;
    }

    server {
        listen 443 ssl;
        # Listen for both the IP and the Name
        server_name localhost 127.0.0.1;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Java (JMeter) works best with these protocols
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://flask_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # This prevents Nginx from dropping the connection if Flask is slow
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
